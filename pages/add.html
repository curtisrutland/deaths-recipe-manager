<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Manager</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <header>
      <h1>Death's Recipe Manager</h1>
      <nav>
        <ul>
          <li>
            <a href="../">Back To Home</a>
          </li>
          <li>
            <a href="./list.html">Recipe List</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>Add A Recipe</h2>
      <form id="recipe-form">
        <label for="title">Recipe name</label>
        <input type="text" name="title" id="title" />
        <label for="description"> Description </label>
        <input type="text" name="description" id="description" />
        <label for="ingredients"> Ingredients </label>
        <textarea name="ingredients" id="ingredients" rows="8" cols="60"></textarea>
        <label for="steps"> Steps </label>
        <textarea name="steps" id="steps" rows="8" cols="60"></textarea>
        <input type="submit" value="Add This Recipe" />
      </form>
      <hr />
      <h2>Preview:</h2>
      <p></p>
      <div>
        <h2 id="titlePrev"></h2>
        <div id="descriptionPrev"></div>
        <h3>Ingredients</h3>
        <div id="ingredientsPrev"></div>
        <h3>Cooking Steps</h3>
        <div id="stepsPrev"></div>
      </div>
    </main>
    <script src=" https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js "></script>
    <script src="../scripts/add.esm.js" type="module"></script>
  </body>
</html>
